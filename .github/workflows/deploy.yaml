name: Deploy to AWS with CloudFormation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ENVIRONMENT: prod
  AWS_REGION: us-east-1
  CLOUDFORMATION_STACK_NAME: test-agents-stack

jobs:
  # ===== Validation Job =====
  validate:
    name: Validate Code and CloudFormation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black pytest boto3 pyyaml cfn-lint
          
      - name: Run linting with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true
        
      - name: Check code formatting with black
        run: |
          black --check . || true
        continue-on-error: true
        
      - name: Validate CloudFormation template
        run: |
          echo "Validating CloudFormation template..."
          cfn-lint cloudformation/template.yaml -i W
          
      - name: Run security checks with bandit
        run: |
          pip install bandit
          bandit -r . -ll || true
        continue-on-error: true
        
      - name: Run unit tests
        run: |
          pytest tests/ -v || true
        continue-on-error: true

  # ===== Test Job =====
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "No requirements.txt found"
          pip install pytest pytest-cov
          
      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=. --cov-report=xml || true
        continue-on-error: true
        
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ===== Pre-Deployment Approval =====
  approval:
    name: Await Manual Approval for Production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [validate, test]
    environment:
      name: production
      
    steps:
      - name: Approve Deployment
        run: echo "Approved for deployment to production"

  # ===== Deployment Job =====
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: approval
    permissions:
      contents: read
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          
      - name: Validate CloudFormation template with AWS
        run: |
          echo "Validating CloudFormation template with AWS..."
          aws cloudformation validate-template \
            --template-body file://cloudformation/template.yaml \
            --region ${{ env.AWS_REGION }}
            
      - name: Check if stack exists
        id: check-stack
        run: |
          if aws cloudformation describe-stacks \
              --stack-name ${{ env.CLOUDFORMATION_STACK_NAME }} \
              --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "stack-exists=true" >> $GITHUB_OUTPUT
          else
            echo "stack-exists=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Create CloudFormation Stack (if not exists)
        if: steps.check-stack.outputs.stack-exists == 'false'
        run: |
          echo "Creating new CloudFormation stack..."
          aws cloudformation create-stack \
            --stack-name ${{ env.CLOUDFORMATION_STACK_NAME }} \
            --template-body file://cloudformation/template.yaml \
            --parameters ParameterKey=Environment,ParameterValue=${{ env.ENVIRONMENT }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --region ${{ env.AWS_REGION }} \
            --tags Key=Project,Value=test-agents Key=Environment,Value=${{ env.ENVIRONMENT }} Key=ManagedBy,Value=GitHub-Actions
            
          echo "Waiting for stack creation to complete..."
          aws cloudformation wait stack-create-complete \
            --stack-name ${{ env.CLOUDFORMATION_STACK_NAME }} \
            --region ${{ env.AWS_REGION }}
            
          echo "Stack created successfully!"
          
      - name: Update CloudFormation Stack (if exists)
        if: steps.check-stack.outputs.stack-exists == 'true'
        run: |
          echo "Updating existing CloudFormation stack..."
          aws cloudformation update-stack \
            --stack-name ${{ env.CLOUDFORMATION_STACK_NAME }} \
            --template-body file://cloudformation/template.yaml \
            --parameters ParameterKey=Environment,ParameterValue=${{ env.ENVIRONMENT }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "No changes to deploy"
            
          echo "Waiting for stack update to complete..."
          aws cloudformation wait stack-update-complete \
            --stack-name ${{ env.CLOUDFORMATION_STACK_NAME }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "Stack update completed or no changes needed"
            
          echo "Stack updated successfully!"
          
      - name: Get Stack Outputs
        id: stack-outputs
        run: |
          echo "Retrieving stack outputs..."
          aws cloudformation describe-stacks \
            --stack-name ${{ env.CLOUDFORMATION_STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'Stacks[0].Outputs' \
            --output table
            
      - name: Post-Deployment Health Check
        run: |
          echo "Running post-deployment health checks..."
          aws lambda invoke \
            --function-name test-agents-prod \
            --region ${{ env.AWS_REGION }} \
            /tmp/lambda-response.json || echo "Lambda health check skipped"
            
          cat /tmp/lambda-response.json 2>/dev/null || echo "No Lambda response"
          
      - name: Send Deployment Notification
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number || 0,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Deployment to AWS completed successfully!\n\nStack: `${{ env.CLOUDFORMATION_STACK_NAME }}`\nEnvironment: `${{ env.ENVIRONMENT }}`\nRegion: `${{ env.AWS_REGION }}`'
            }).catch(e => console.log('Not on a PR, skipping notification'))

  # ===== Rollback Job (triggered on failure) =====
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    if: failure() && needs.deploy.result == 'failure'
    needs: deploy
    permissions:
      contents: read
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          
      - name: Get latest successful stack
        id: get-previous-stack
        run: |
          echo "Checking for previous stack versions..."
          # This demonstrates a rollback strategy
          # In production, you might use automated backups or event-based triggers
          aws cloudformation describe-stack-events \
            --stack-name ${{ env.CLOUDFORMATION_STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'StackEvents[?StackStatus==`CREATE_COMPLETE` || StackStatus==`UPDATE_COMPLETE`][0]' \
            --output text || echo "No previous successful stack state found"
            
      - name: Attempt Stack Rollback
        continue-on-error: true
        run: |
          echo "Attempting to rollback stack..."
          aws cloudformation cancel-update-stack \
            --stack-name ${{ env.CLOUDFORMATION_STACK_NAME }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null || \
          aws cloudformation delete-stack \
            --stack-name ${{ env.CLOUDFORMATION_STACK_NAME }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null || \
          echo "Rollback action completed"
            
      - name: Send Rollback Notification
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number || 0,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Deployment failed and rollback initiated.\n\nStack: `${{ env.CLOUDFORMATION_STACK_NAME }}`\nEnvironment: `${{ env.ENVIRONMENT }}`\nPlease check the logs for details.'
            }).catch(e => console.log('Not on a PR, skipping notification'))
